<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Quét mã vạch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pos-container">
    <h1>🛒 POS QUÉT MÃ VẠCH</h1>

    <input type="text" id="qrInput" placeholder="Quét mã vạch hoặc nhập mã...">
    
    <table id="cartTable">
      <thead>
        <tr>
          <th>Tên</th>
          <th>SL</th>
          <th>Đơn giá</th>
          <th>Thành tiền</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="cart-footer">
      <button class="btn-outline" onclick="clearCart()">🗑️ Xóa giỏ hàng</button>
      <p class="total">Tổng tiền: <span id="total">0</span> VND</p>
    </div>

    <button class="btn-primary" onclick="exportInvoice()">Xuất hóa đơn</button>

    <footer>
      Made by <strong>YOU</strong> - POS Demo
    </footer>
  </div>

  <script src="script.js"></script>
  <script src="bill.js"></script>
</body>
</html>
