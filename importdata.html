<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Datasys - Website Master</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
    button { padding: 4px 8px; cursor: pointer; }
    .edit { background: #4400ff; color: white; border: none; }
    .delete { background: #ff1100; color: white; border: none; }
    input, select { padding: 5px; margin: 3px; }
</style>
</head>
<body>

<h2>Nhập & Quản lý dữ liệu</h2>
<form id="dataForm">
    <input type="text" id="col1" placeholder="A1" required>
    <input type="text" id="col2" placeholder="B1" required>
    <input type="text" id="col3" placeholder="C1" required>
    <select id="status">
        <option value=" - trống - "> - trống - </option>
        <option value="Hoạt động bình thường">Hoạt động bình thường</option>
        <option value="Hoạt động hạn chế">Hoạt động hạn chế</option>
        <option value="Ngừng hoạt động">Ngừng hoạt động</option>
        <option value="Đang xử lý">Đang xử lý</option>
        <option value="Đang bảo trì">Đang bảo trì</option>
        <option value="Đang chờ duyệt">Đang chờ duyệt</option>
        <option value="Từ chối duyệt">Từ chối duyệt</option>
    </select>
    <button type="submit">Thêm</button>
</form>
<div style="color:red; border:1px solid red; padding:5px; display:inline-block;">
  Tính năng đang được bảo trì
</div>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Cột A1</th>
            <th>Cột B1</th>
            <th>Cột C1</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
    </thead>
    <tbody id="dataTable"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("tableData")) || [];

// Sinh ID 8 số ngẫu nhiên + không trùng
function generateID() {
    let id;
    do {
        id = Math.floor(10000000 + Math.random() * 90000000).toString();
    } while (data.some(row => row[0] === id));
    return id;
}

function saveData() {
    localStorage.setItem("tableData", JSON.stringify(data));
}

function renderTable() {
    const tbody = document.getElementById("dataTable");
    tbody.innerHTML = "";
    data.forEach((row, index) => {
        const tr = document.createElement("tr");

        row.forEach((cell) => {
            let td = document.createElement("td");
            td.textContent = cell;
            tr.appendChild(td);
        });

        // Hành động
        let tdActions = document.createElement("td");

        let btnEdit = document.createElement("button");
        btnEdit.textContent = "Sửa";
        btnEdit.className = "edit";
        btnEdit.onclick = () => editRow(index);

        let btnDelete = document.createElement("button");
        btnDelete.textContent = "Xóa";
        btnDelete.className = "delete";
        btnDelete.onclick = () => deleteRow(index);

        tdActions.appendChild(btnEdit);
        tdActions.appendChild(btnDelete);
        tr.appendChild(tdActions);

        tbody.appendChild(tr);
    });
}

function addRow(e) {
    e.preventDefault();
    if (data.length >= 10) {
        alert("Chỉ tối đa 10 hàng!");
        return;
    }
    const id = generateID();
    const col2 = document.getElementById("col1").value;
    const col3 = document.getElementById("col2").value;
    const col4 = document.getElementById("col3").value;
    const status = document.getElementById("status").value;

    data.push([id, col2, col3, col4, status]);
    saveData();
    renderTable();
    e.target.reset();
}

function deleteRow(index) {
    if (confirm("Xóa hàng này?")) {
        data.splice(index, 1);
        saveData();
        renderTable();
    }
}

function editRow(index) {
    const newCol1 = prompt("Nhập giá trị mới cho Cột 2:", data[index][1]);
    const newCol2 = prompt("Nhập giá trị mới cho Cột 3:", data[index][2]);
    const newCol3 = prompt("Nhập giá trị mới cho Cột 4:", data[index][3]);
    const newStatus = prompt("Nhập trạng thái (Hoạt động/Không hoạt động):", data[index][4]);

    if (newCol2 && newCol3 && newCol4 && newStatus) {
        data[index][1] = newCol1;
        data[index][2] = newCol2;
        data[index][3] = newCol3;
        data[index][4] = newStatus;
        saveData();
        renderTable();
    }
}

document.getElementById("dataForm").addEventListener("submit", addRow);
renderTable();
</script>
<div class="copy_layout">
    <p>
        &copy; <span id="year"></span>Design by <a href="#" target="_blank">Nguyễn Minh Thuận IT</a>
    </p>
</div>
</body>
</html>
